{% extends 'base.html' %}
{% block content %}
<h2>Administrador del Scrapper</h2>
{% for item in data %}
<div class="card p-3 mb-3">
    <h5>{{ item.url }}</h5>
    <p>Status: <strong>{{ item.status }}</strong></p>
    <form action="/scrapper/run/{{ item.id }}" method="POST">
        <button class="btn btn-primary">Iniciar Escrapeo</button>
    </form>
</div>
{% endfor %}
{% endblock %}
