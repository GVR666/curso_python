{% extends 'base.html' %}
{% block content %}
<h2>Configuración</h2>
<form method="POST" class="mb-4">
    <input type="url" name="url" class="form-control mb-2" placeholder="Pegar URL aquí" required>
    <button class="btn btn-success">Añadir Fuente</button>
</form>
<ul class="list-group">
    {% for src in sources %}
    <li class="list-group-item">{{ src.url }}</li>
    {% endfor %}
</ul>
{% endblock %}
